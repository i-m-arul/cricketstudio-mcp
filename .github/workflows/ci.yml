name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly smoke against the bundled snapshot (README roadmap v0.2).
    - cron: '0 6 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Smoke test (stdio JSON-RPC, all tools)
        run: npm run smoke
